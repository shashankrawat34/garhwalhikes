<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Trek to the heart of Himalayas with Garhwal Hikes. Expert guided treks in Uttarakhand including Panch Kedar, Kuari Pass, Valley of Flowers and more." />
    <meta name="keywords" content="trekking, Himalayas, Uttarakhand, Garhwal, adventure, trekking company, hiking" />
    <meta name="author" content="Garhwal Hikes" />
    <meta name="theme-color" content="#228B22" />
    
    <!-- Open Graph Tags for Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://garhwalhikes.com/" />
    <meta property="og:title" content="Best Trekking Company in Uttarakhand - Garhwal Hikes" />
    <meta property="og:description" content="Expert guided treks in the heart of Himalayas. Explore Panch Kedar, Valley of Flowers, Kuari Pass, Roopkund and more with Garhwal Hikes." />
    <meta property="og:image" content="https://garhwalhikes.com/logo.jpg" />
    <meta property="og:site_name" content="Garhwal Hikes" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://garhwalhikes.com/" />
    <meta name="twitter:title" content="Best Trekking Company in Uttarakhand - Garhwal Hikes" />
    <meta name="twitter:description" content="Expert guided treks in the heart of Himalayas. Explore Panch Kedar, Valley of Flowers, Kuari Pass, Roopkund and more." />
    <meta name="twitter:image" content="https://garhwalhikes.com/logo.jpg" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://garhwalhikes.com/" />
    
    <title>Best Trekking Company in Uttarakhand - Garhwal Hikes</title>
    
    <!-- Font-display: swap ensures text is visible during font load -->
    <style>
      @font-face {
        font-family: -apple-system;
        font-display: swap;
      }
      @font-face {
        font-family: BlinkMacSystemFont;
        font-display: swap;
      }
      /* Preload system fonts for faster rendering */
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
    
    <!-- Resource hints for faster performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <div id="root"></div>
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Garhwal Hikes",
      "description": "Expert guided trekking company offering premium trekking experiences in the Garhwal Himalayas of Uttarakhand",
      "url": "https://garhwalhikes.com",
      "logo": "https://garhwalhikes.com/logo.jpg",
      "image": "https://garhwalhikes.com/logo.jpg",
      "sameAs": [
        "https://www.instagram.com/garhwalhikes",
        "https://www.facebook.com/garhwalhikes",
        "https://www.youtube.com/garhwalhikes"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "email": "info@garhwalhikes.com",
        "availableLanguage": ["en", "hi"]
      },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Uttarakhand",
        "addressCountry": "IN",
        "addressRegion": "Uttarakhand"
      }
    }
    </script>
    
    <!-- JSON-LD Structured Data for WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://garhwalhikes.com",
      "name": "Garhwal Hikes",
      "description": "Premium trekking experiences in Garhwal Himalayas",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://garhwalhikes.com/treks"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
